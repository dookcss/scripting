name = "mail-proxy"
main = "index.ts"
compatibility_date = "2024-02-22"

compatibility_flags = [ "nodejs_compat" ]

[vars]
AUTH_TOKEN = "dookcss"


[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

